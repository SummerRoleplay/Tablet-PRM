<style>
:root {
  --primary: #ff3b3b;
  --primary-hover: #ff5c5c;
  --bg-dark: #0f0f12;
  --card-bg: #1a1a1e;
  --input-bg: #252529;
  --text-main: #e0e0e0;
  --text-dim: #a0a0a5;
  --radius: 12px;
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
}

/* ===== GLOBAL ===== */
* { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

body {
  margin: 0;
  background-color: var(--bg-dark);
  color: var(--text-main);
  line-height: 1.6;
  background-image: 
    radial-gradient(circle at 0% 0%, rgba(255, 59, 59, 0.05) 0%, transparent 40%),
    radial-gradient(circle at 100% 100%, rgba(255, 59, 59, 0.05) 0%, transparent 40%);
  background-attachment: fixed;
}

/* ===== HEADER ===== */
header {
  background: rgba(26, 26, 30, 0.8);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  padding: 20px;
  text-align: center;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--primary);
  position: sticky;
  top: 0;
  z-index: 1000;
}

/* ===== NAV ===== */
nav {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  padding: 20px;
  max-width: 1200px;
  margin: 0 auto;
}

nav button {
  background: var(--card-bg);
  color: var(--text-dim);
  border: 1px solid rgba(255, 255, 255, 0.1);
  padding: 10px 18px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s ease;
}

nav button:hover {
  background: rgba(255, 59, 59, 0.1);
  color: var(--primary);
  border-color: var(--primary);
  transform: translateY(-2px);
}

/* ===== TABS & CARDS ===== */
.tab {
  display: none;
  padding: 20px;
  animation: fadeIn 0.4s ease-out;
}

.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.card {
  max-width: 750px;
  margin: 0 auto 50px;
  background: var(--card-bg);
  border-radius: 20px;
  padding: 40px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(255, 255, 255, 0.05);
}

.card h2 {
  margin-top: 0;
  font-size: 24px;
  color: #fff;
  border-left: 4px solid var(--primary);
  padding-left: 15px;
  margin-bottom: 30px;
}

/* ===== FORM ELEMENTS ===== */
label {
  display: block;
  margin-bottom: 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
}

input, select, textarea {
  width: 100%;
  padding: 14px;
  background: var(--input-bg);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: var(--radius);
  color: #fff;
  font-size: 15px;
  margin-bottom: 25px;
  transition: all 0.2s;
}

input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: var(--primary);
  background: #2d2d33;
  box-shadow: 0 0 0 4px rgba(255, 59, 59, 0.1);
}

button.send {
  background: var(--primary);
  color: white;
  border: none;
  padding: 16px;
  width: 100%;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(255, 59, 59, 0.3);
}

button.send:hover {
  background: var(--primary-hover);
  transform: translateY(-2px);
}

.success {
  margin-top: 20px;
  color: #00ff88;
  text-align: center;
  font-weight: 600;
}
</style>
</head>

function openTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function sendForm(e,webhooks,title,colors){
  e.preventDefault();
  const form=e.target;
  let values="";
  form.querySelectorAll("label").forEach(label=>{
    let input=label.nextElementSibling;
    if(input){
      values+=label.innerText+": "+(input.value||"Brak")+"\n";
    }
  });
  webhooks.forEach((webhook,i)=>{
    fetch(webhook,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({embeds:[{title:title,description:values,color:colors[i]||16711680}]})
    });
  });
  form.querySelector(".success").innerText="Wysłane pomyślnie!";
  document.getElementById("sendSound").play();
  form.reset();
}
</script>
